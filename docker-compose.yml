services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mailer_user
      POSTGRES_PASSWORD: mailer_password
      POSTGRES_DB: mailer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailer_user -d mailer_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=mailer_user
      - DB_PASSWORD=mailer_password
      - DB_NAME=mailer_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_ENCRYPTION_KEY=supersecret32characterkey1234567
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=mailer_user
      - DB_PASSWORD=mailer_password
      - DB_NAME=mailer_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_ENCRYPTION_KEY=supersecret32characterkey1234567
      - WORKER_CONCURRENCY=20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3000/api/v1
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
